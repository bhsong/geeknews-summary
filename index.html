<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>GeekNews 요약 + 챗봇</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>GeekNews 첫 10개 요약</h1>
<button id="go">요약 시작</button>
<div id="result"></div>

<h2>기사 챗봇</h2>
<div id="chatbox"><p class="muted">요약된 기사들에 대해 물어보세요.</p></div>
<div id="chatform">
    <input id="chatinput" placeholder="예: 일리야 서츠케버 추천 논문이 뭐야?">
    <button id="send">전송</button>
</div>

<script src="app.js"></script>
</body>
</html>
